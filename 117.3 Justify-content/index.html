<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <!-- css bootstrap -->
        <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"

            integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
            crossorigin="anonymous" />

        <!-- my styles -->
        <link rel="stylesheet" href="./mystyles.css" />

    </head>
    <body>
        <!-- 6.3 Justify content (bài 89.2) -->
        <!--
        .justify-content-start      -> justify-content: flex-start;
        .justify-content-end        -> justify-content: flex-end;
        .justify-content-center     -> justify-content: center;
        .justify-content-between    -> justify-content: space-between;
        .justify-content-around     -> justify-content: space-around;
        .justify-content-evenly     -> justify-content: space-evenly;
        -->

        <div class="d-flex justify-content-evenly m-3 border border-primary">
            <div class="p-2 border border-dark bd-highlight">Justify</div>
            <div class="p-2 border border-dark bd-highlight">Content</div>
            <div class="p-2 border border-dark bd-highlight">Start</div>
        </div>



        <!-- js bootstrap -->
        <script
            src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
            integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
            crossorigin="anonymous"></script>
    </body>
</html>
