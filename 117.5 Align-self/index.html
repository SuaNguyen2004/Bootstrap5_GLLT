<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <!-- css bootstrap -->
        <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
            rel="stylesheet"
            integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
            crossorigin="anonymous" />

        <!-- my styles -->
        <link rel="stylesheet" href="./mystyles.css" />
        <title>Document</title>
    </head>
    <body>
        <!-- 117.5 Align self (89.7) -->
        <!--
        .align-self-start -> align-self: flex-start;
        .align-self-end -> align-self: flex-end;
        .align-self-center -> align-self: center;
        .align-self-baseline -> align-self: baseline;
        .align-self-stretch -> align-self: stretch;
        -->

        <div class="d-flex mb-3 border border-primary " style="height: 100px">
            <div class="p-2 border border-dark">Flex item</div>
            <div class="align-self-start p-2 border border-dark">Aligned flex item</div>
            <div class="p-2 border border-dark">Flex item</div>
        </div>
        <div class="d-flex mb-3 border border-primary " style="height: 100px">
            <div class="p-2 border border-dark">Flex item</div>
            <div class="align-self-end p-2 border border-dark">Aligned flex item</div>
            <div class="p-2 border border-dark">Flex item</div>
        </div>
        <div class="d-flex mb-3 border border-primary " style="height: 100px">
            <div class="p-2 border border-dark">Flex item</div>
            <div class="align-self-center p-2 border border-dark">Aligned flex item</div>
            <div class="p-2 border border-dark">Flex item</div>
        </div>
        <div class="d-flex mb-3 border border-primary align-items-baseline " style="height: 100px">
            <div class="p-2 border border-dark">Flex item</div>
            <div class="align-self-baseline p-2 border border-dark" style="font-size: 25px;">Aligned flex item</div>
            <div class="p-2 border border-dark">Flex item</div>
        </div>
        <div class="d-flex mb-3 border border-primary " style="height: 100px">
            <div class="p-2 border border-dark">Flex item</div>
            <div class="align-self-stretch p-2 border border-dark" style="font-size: 25px;">Aligned flex item</div>
            <div class="p-2 border border-dark">Flex item</div>
        </div>

        <!-- js bootstrap -->
        <script
            src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
            integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
            crossorigin="anonymous"></script>
    </body>
</html>
