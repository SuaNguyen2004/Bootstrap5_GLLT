<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <!-- css bootstrap -->
        <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
            rel="stylesheet"
            integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
            crossorigin="anonymous" />

        <!-- my styles -->
        <link rel="stylesheet" href="./mystyles.css" />
        <title>Document</title>
    </head>
    <body>
        <!-- 117.4 Align items (89.3) -->

        <!--
        .align-items-start -> align-items: flex-start;
        .align-items-end -> align-items: flex-end;
        .align-items-center -> align-items: center;
        .align-items-baseline -> align-items: baseline;
        .align-items-stretch -> align-items: stretch;
        -->

        <div class="d-flex align-items-start m-3 border border-primary" style="height: 100px">
            <div class="p-2 border border-dark">Flex item</div>
            <div class="p-2 border border-dark">Flex item</div>
            <div class="p-2 border border-dark">Flex item</div>
        </div>
        <div class="d-flex align-items-end m-3 border border-primary" style="height: 100px">
            <div class="p-2 border border-dark">Flex item</div>
            <div class="p-2 border border-dark">Flex item</div>
            <div class="p-2 border border-dark">Flex item</div>
        </div>
        <div class="d-flex align-items-center m-3 border border-primary" style="height: 100px">
            <div class="p-2 border border-dark">Flex item</div>
            <div class="p-2 border border-dark">Flex item</div>
            <div class="p-2 border border-dark">Flex item</div>
        </div>
        <div class="d-flex align-items-baseline m-3 border border-primary" style="height: 100px">
            <div class="p-2 border border-dark">Flex item</div>
            <div class="p-2 border border-dark" style="font-size: 40px">Flex item</div>
            <div class="p-2 border border-dark">Flex item</div>
        </div>
        <div class="d-flex m-3 border border-primary" style="height: 100px">
            <div class="p-2 border border-dark">Flex item</div>
            <div class="p-2 border border-dark" style="font-size: 40px">Flex item</div>
            <div class="p-2 border border-dark">Flex item</div>
        </div>

        <!-- js bootstrap -->
        <script
            src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
            integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
            crossorigin="anonymous"></script>
    </body>
</html>
