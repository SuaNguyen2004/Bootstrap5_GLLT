    <body class="p-3 m-0 border-0 bd-example m-0 border-0 bd-example-flex">
        <!-- 6.7 flex-fill: (89.9) -->
        <!--
        flex-fill   ->flex: 1 1 auto : chia tỷ lệ giãn,

        1 flex-grow 0 ( default) | 1 | ... Chia tỷ lệ giãn chiếm theo trọng số (89.7)
        2 flex-shrink 0- không bị co lại | 1 ( default) ... Xác định khả năng (89.8)
        co lại của item để thích nghi với không gian hạn chế khi viewport không còn đủ chỗ chứa
        3 flex-basis Set main size item - Theo trục main axis (89.8)
        -->

        <div class="d-flex">
            <div class="p-2 flex-fill">Flex item with a lot of content</div>
            <div class="p-2 flex-fill">Flex item 2222222222</div>
            <div class="p-2 flex-fill">Flex item</div>
        </div>
