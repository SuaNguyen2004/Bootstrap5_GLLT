<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <!-- css bootstrap -->
        <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
            rel="stylesheet"
            integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
            crossorigin="anonymous" />

        <!-- my styles -->
        <link rel="stylesheet" href="./mystyles.css" />
        <title>Document</title>
    </head>
    <body>
        <!-- 117.2 Direction (bài 89.5) -->
        <!--
        .flex-row                   ->flex-direction: row
        .flex-row-reverse           ->flex-direction: row-reverse
        .flex-column                ->flex-direction: column
        .flex-column-reverse        ->flex-direction: column-reverse
        -->

        <div class="d-flex border border-danger mb-3">
            <div class="p-2 border border-primary">Flex item 1</div>
            <div class="p-2 border border-primary">Flex item 2</div>
            <div class="p-2 border border-primary">Flex item 3</div>
        </div>
        <div class="d-flex border border-danger mb-3 flex-row-reverse">
            <div class="p-2 border border-primary">Flex item 1</div>
            <div class="p-2 border border-primary">Flex item 2</div>
            <div class="p-2 border border-primary">Flex item 3</div>
        </div>

        <div class="d-flex border border-danger flex-column mb-3" style="height: 200px;">
            <div class="p-2 border border-primary">Flex item 1</div>
            <div class="p-2 border border-primary">Flex item 2</div>
            <div class="p-2 border border-primary">Flex item 3</div>
            <div class="p-2 border border-primary">Flex item 4</div>
        </div>
        <div class="d-flex border border-danger flex-column-reverse" style="height: 200px;">
            <div class="p-2 border border-primary">Flex item 1</div>
            <div class="p-2 border border-primary">Flex item 2</div>
            <div class="p-2 border border-primary">Flex item 3</div>
        </div>

        <!-- js bootstrap -->
        <script
            src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
            integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
            crossorigin="anonymous"></script>
    </body>
</html>
