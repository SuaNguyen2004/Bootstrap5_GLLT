<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <!-- css bootstrap -->
        <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
            rel="stylesheet"
            integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
            crossorigin="anonymous" />

        <!-- my styles -->
        <link rel="stylesheet" href="./mystyles.css" />
        <title>Document</title>
    </head>
    <body>
        <!-- 117.6 Grow and shrink (89.7 89.8)
        Trong bootstrap thì chỉ có 2 giá trị của grow và shrink là 0 và 1, có thể kiểm tra class của bt để biết
        -->

        <div class="d-flex border border-danger m-3">
            <div class="p-2 bg-primary border border-secondary flex-grow-1">Flex item</div>
            <div class="p-2 bg-primary border border-secondary flex-grow-1">Flex item</div>
            <div class="p-2 bg-primary border border-secondary">Third flex item</div>
        </div>

        <div class="d-flex border border-danger m-3">
            <div class="p-2 bg-primary border border-secondary flex-shrink-0" style="width: 300px;">Flex item</div>
            <div class="p-2 bg-primary border border-secondary flex-shrink-1">Flex item</div>
        </div>

        <!-- js bootstrap -->
        <script
            src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
            integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
            crossorigin="anonymous"></script>
    </body>
</html>
